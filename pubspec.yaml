name: mr7_chat
description: MR7 Chat - Advanced Chat and AI Platform for Android and Web
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # ── Firebase ────────────────────────────────
  firebase_core: ^3.6.0
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.3
  firebase_analytics: ^11.3.3

  # ── State management ─────────────────────────
  provider: ^6.1.2

  # ── Fonts & typography ───────────────────────
  google_fonts: ^6.2.1

  # ── UI components ────────────────────────────
  cached_network_image: ^3.4.1
  photo_view: ^0.15.0
  video_player: ^2.9.1
  badges: ^3.1.2

  # ── Media picking ────────────────────────────
  image_picker: ^1.1.2

  # ── Network ──────────────────────────────────
  http: ^1.2.2

  # ── Storage & security ───────────────────────
  shared_preferences: ^2.3.3
  crypto: ^3.0.5
  uuid: ^4.5.1
  path_provider: ^2.1.5

  # ── Utilities ────────────────────────────────
  intl: ^0.19.0
  url_launcher: ^6.3.1
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1

# ── App icon configuration ───────────────────
flutter_launcher_icons:
  android: true
  ios: false
  web:
    generate: true
    image_path: "assets/icons/icon.png"
    background_color: "#0A0A0A"
    theme_color: "#8B0000"
  image_path: "assets/icons/icon.png"
  min_sdk_android: 24
  adaptive_icon_background: "#0A0A0A"
  adaptive_icon_foreground: "assets/icons/icon.png"

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/icons/
    - assets/images/