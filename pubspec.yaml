name: mr7_chat
description: MR7-Chat - Advanced Chat & AI Platform
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Firebase
  firebase_core: ^2.27.0
  cloud_firestore: ^4.15.5
  firebase_storage: ^11.6.7
  firebase_analytics: ^10.8.7

  # State Management
  provider: ^6.1.2

  # UI
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  lottie: ^3.1.0
  photo_view: ^0.14.0
  video_player: ^2.8.3
  chewie: ^1.7.4
  flutter_svg: ^2.0.9
  glassmorphism: ^3.0.0

  # Media
  image_picker: ^1.0.7
  file_picker: ^6.2.1
  image_cropper: ^5.0.1
  video_compress: ^3.1.2

  # Network
  http: ^1.2.1
  dio: ^5.4.3+1
  connectivity_plus: ^6.0.3

  # Storage & Crypto
  shared_preferences: ^2.2.3
  crypto: ^3.0.3
  uuid: ^4.4.0
  path: ^1.9.0
  path_provider: ^2.1.3

  # Utils
  # تم تعديل هذا الإصدار ليتوافق مع flutter_localizations في بيئة البناء
  intl: 0.18.1 
  timeago: ^3.6.1
  url_launcher: ^6.2.6
  share_plus: ^9.0.0
  permission_handler: ^11.3.1
  flutter_local_notifications: ^17.1.2
  emoji_picker_flutter: ^2.1.0
  flutter_staggered_animations: ^1.1.1
  infinite_scroll_pagination: ^4.0.0
  pull_to_refresh: ^2.0.0
  badges: ^3.1.2
  flutter_speed_dial: ^7.0.0
  pinput: ^5.0.0
  smooth_page_indicator: ^1.2.0+3
  story_view: ^0.16.0
  audioplayers: ^6.0.0
  record: ^5.1.1
  fl_chart: ^0.68.0
  flutter_colorpicker: ^1.1.0
  qr_flutter: ^4.1.0
  barcode_scan2: ^4.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/icons/
    - assets/images/

  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700
        - asset: assets/fonts/Cairo-SemiBold.ttf
          weight: 600
